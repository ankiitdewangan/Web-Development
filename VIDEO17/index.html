<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
</head>
<style>
    /* element selector */
    div{
    background-color: aqua;
    }
    /* class selector */
    .red{
        background-color: blue;
    }
    /* id selector */
#green{
    background-color: green;
}
/* child selector */
div > p {
 color: blanchedalmond;
}
/* decendent selector */
div p {
    background-color: blueviolet;
}
/* universal selector */
*{
    margin: 0;
    padding: 10px;
}
/* psudo selectors */
a:visited{
    color: red;
}
a:link{
    color: lightsalmon;
}
a:active{
    color: rgb(105, 90, 173);
    background-color: black;
}
a:hover{
    color: whitesmoke;
    background-color: black;
}

p:first-child{
    background-color: aqua;
}
</style>
<body>
   <main class="one">
    <p>first</p>
    <p>second</p>
   </main>
    <div class="red">
        I'am a div
    </div>
    <div>
        I'am a div2
    </div>
    <div id="green">
        iam div3
        <p>i am a para inside div3</p>
    </div>

    <div>
        <main>
            <article>
                <p>I am inside p which is inside main which is inside div</p>
            </article>
        </main>
        
    </div>
    <a href="https://www.google.com">Google</a>
    <a href="https://instagram.com">Instagram</a>
</body>

</html>
