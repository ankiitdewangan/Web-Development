<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms- lets make it</title>
</head>

<body>
    <h1>Form to apply for Admission Counselling</h1>
    <form action="post"></form>
    <div>
        <label for="username">Create Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
    </div>

    <div>
        <input type="radio" id="male" name="gender" value="male"></=>
        <label for="male">male</label>
        <input type="radio" id="female" name="gender" value="female"></=>
        <label for="female">female</label>
    </div>

    <div>
        <input type="checkbox" name="passed" id="passed" value="yes">
        <label for="passed">12th Passed</label>
    </div>
    <div>
        <label for="comment">About yourself...

        </label>
        <textarea id="comment" name="yourself" rows="4" cols="50"></textarea>

    </div>
    <div>
        <select name="fruits">
            <option value="Delhi">Delhi</option>
            <option value="Haryana">Haryana</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
        </select>
    </div>
</body>

</html>
