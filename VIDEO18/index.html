<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>

    <style>
        .box{
            background-color: rgb(209, 19, 124);
        }
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            color: rgb(5, 27, 1);
            padding: 10px;
            margin: 25px;
            border: 3px solid black;
            height: 200px;
            box-sizing: border-box;
        }
        .box2{
            color: rgb(202, 236, 9);
            padding: 10px;
            margin: 25px;
            border: 3px solid black;
            height: 200px;
            box-sizing: border-box;
        }
    </style>

</head>
<body>
    <div class="box box1">I am a BOX.</div>
    <div class="box box2">I am another BOX</div>
</body>
</html>
