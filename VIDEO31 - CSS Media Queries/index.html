<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Media Queries</title>
    <style>
        body {
            background-color: red;
        }
@media only screen and (orientation : landscape){
    body{
        color: white;
        border: 1px solid white;
    }
    
}
        @media only screen and (max-width: 455px) {
            body {
                background-color: rgb(31, 53, 10);

                .boxes {
                    flex-direction: column;
                    background-color: rgb(19, 62, 141);
                }
            }
        }

        .box {
            height: 355px;
            width: 355px;
            background-color: rgb(64, 113, 133);
            margin: 5px;
            padding: 5px;
        }

        .boxes {
            display: flex;
        }
    </style>
</head>

<body>
    <div>
        Hey, I am a red body guy.
    </div>
    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
