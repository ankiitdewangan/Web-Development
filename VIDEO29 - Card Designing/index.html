<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=IM+Fell+English+SC&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <style>
        body {
            background-color: rgb(13, 46, 46)
        }

        * {
            margin: 0;
            padding: 0;
        }

        .card {
            background-color: antiquewhite;
            height: 350px;
            width: 180px;
            border-radius: 9px;
            margin-top: 40px;
            margin-left: 35%;

        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 9px;
            padding-top: 5px;
        }

        .main {
            padding: 11px;
        }

        .main p {
            font-size: 12px;
            font-family: "Poppins", sans-serif;
            font-weight: 300;
            font-style: normal;
            /* text-align: center; */
            color: rgb(24, 36, 31);
        }

        .buttons {
            padding: 0 40px;
            font-family: "Poppins", sans-serif;
            font-weight: 500;
            font-style: italic;
        }

        .buttons span {
            border: 1px solid rgba(21, 36, 1, 0.205);
            padding: 0 4px;
            border-radius: 8px;
            font-size: 10px;
            background-color: rgb(142, 156, 134);
        }

        h2 {
            font-family: "Montserrat", sans-serif;
            font-size: 20px;
            font-weight: 700;
            font-style: normal;
        }

        .button2 {
            text-align: center;
        }

        .button2 button {
            border: none;
            border-radius: 10px;
            padding: 4px;
            background-color: rgb(27, 99, 99);
            color: rgb(181, 181, 219);
            margin-top: 15px;
            font-family: "Baloo Bhai 2", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: italic;
        }
        .button2 button:hover{
            background-color:  rgb(19, 71, 71);
            color: wheat;
        }
    </style>
</head>

<body>
    <div class="card">

        <span class="image">
            <img width="170px"
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR5DPziiolpJFlbkiVS_wGdPmf1xYvu9Z9kWQ&s"
                alt="mountain image">
        </span>

        <div class="buttons">
            <span>Beaches</span>
            <span>Rivers</span>
        </div>



        <div class="main">
            <h2>Mountain View</h2>
            <p>
                Wide-angle landscape featuring a magestic mountain range along with river and forests.
            </p>
        </div>
        <div class="button2">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
