<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid black;
            height: 130px;
            width: 70vw;
            padding: 3px;
            margin: 3px;
        }

        .box1 {
            background-color: yellowgreen;
            /* position: absolute;
            top: 0px; */
            position: sticky;
            top: 0px;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 111px;


        }

        .box2 {
            background-color: darkolivegreen;
            /* position: relative;
            top: -82px;
            left: 46px;
            z-index: -1; */
        }

        .box3 {
            background-color: mediumseagreen;
            /* position: fixed;
            left: 7vw;
            height: 80px; */
        }

        .box4 {
            background-color: steelblue;


        }

        .parent {
            margin: 5px;
            padding: 30px;
            border: 3px solid purple;
            position: absolute;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
